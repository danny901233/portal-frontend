name: Deploy to Production (main branch)

on:
  push:
    branches: [receptionmate-demo-branch-2]

jobs:
  deploy-frontend-production:
    name: Deploy Frontend → EC2 Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy frontend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Deploying frontend to PRODUCTION..."
            cd ~/portal-frontend

            git fetch origin
            git checkout receptionmate-demo-branch-2
            git pull origin receptionmate-demo-branch-2

            echo "📦 Installing dependencies..."
            npm install

            echo "🏗️  Building Next.js..."
            npm run build

            echo "🔄 Restarting frontend (PM2)..."
            pm2 restart 3

            echo "✅ Production frontend deploy complete!"
            pm2 logs 3 --lines 20 --nostream

  deploy-backend-production:
    name: Deploy Backend → EC2 Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Deploying backend to PRODUCTION..."
            cd ~/portal-frontend

            git fetch origin
            git checkout receptionmate-demo-branch-2
            git pull origin receptionmate-demo-branch-2

            cd backend
            npm install
            npm run build

            echo "🔄 Restarting backend (PM2)..."
            pm2 restart backend

            echo "✅ Production backend deploy complete!"
            pm2 logs backend --lines 20 --nostream

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-frontend-production, deploy-backend-production]
    if: failure()

    steps:
      - name: Notify deployment failed
        run: |
          echo "❌ Production deployment failed! Check Actions tab for details."
          # Add Slack/email notification here if needed
