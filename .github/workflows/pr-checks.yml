name: PR Checks — Code Review Validation

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]

jobs:
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check TypeScript types
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://placeholder.com' }}

  label-pr:
    name: Auto-label PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Auto-label based on branch name
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labels = [];

            if (branch.startsWith('feature/')) labels.push('feature');
            if (branch.startsWith('fix/')) labels.push('bug');
            if (branch.startsWith('hotfix/')) labels.push('hotfix', 'priority: high');
            if (branch.startsWith('chore/')) labels.push('chore');
            if (branch.startsWith('docs/')) labels.push('documentation');

            if (labels.length > 0) {
              // Create labels if they don't exist, then apply them
              for (const label of labels) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: label === 'bug' ? 'd73a4a' :
                           label === 'feature' ? '0075ca' :
                           label === 'hotfix' ? 'e4e669' :
                           label === 'priority: high' ? 'b60205' :
                           'cfd3d7'
                  });
                } catch (e) {
                  // Label already exists, that's fine
                }
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
            }
